<html>

	<head>
		<title>Merge Tanks 1.1</title>
		<meta charset='utf-8' />
		<meta name='renderer' content='webkit' />
		<meta name='viewport'
			content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' />
		<meta name='apple-mobile-web-app-capable' content='yes' />
		<meta name='full-screen' content='true' />
		<meta name='x5-fullscreen' content='true' />
		<meta name='360-fullscreen' content='true' />
		<meta name='laya' screenorientation='landscape' />
		<meta http-equiv='expires' content='0' />
		<meta http-equiv='X-UA-Compatible' content='IE=edge,chrome=1' />
		<meta http-equiv='expires' content='0' />
		<meta http-equiv='Cache-Control' content='no-siteapp' />

		<!-- Telegram Web App SDK：必须在其他脚本之前加载 -->
		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		<script type="text/javascript">
			// 通知 Telegram 页面已就绪并全屏展开
			try {
				window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready();
				window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.expand();
			} catch (e) {
				console.log('Telegram WebApp init failed:', e);
			}
		</script>

		<!-- Adsgram 激励广告 SDK -->
		<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

		<style>
			#tg-ad-layer {
				position: fixed;
				bottom: 16px;
				left: 16px;
				z-index: 9999;
				display: flex;
				flex-direction: column;
				align-items: flex-start;
				gap: 8px;
				pointer-events: none;
			}
			#tg-reward-btn {
				pointer-events: auto;
				font-size: 15px;
				padding: 10px 18px;
				background: linear-gradient(135deg, #00b4d8, #0096c7);
				color: #fff;
				border: none;
				border-radius: 10px;
				box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
				cursor: pointer;
				display: none;
			}
			#tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
			#tg-score-toast {
				pointer-events: none;
				font-size: 20px;
				font-weight: bold;
				color: #FFD700;
				text-shadow: 0 0 8px #000;
				display: none;
				animation: floatUp 1.2s ease forwards;
			}
			@keyframes floatUp {
				0%   { opacity: 1; transform: translateY(0); }
				100% { opacity: 0; transform: translateY(-60px); }
			}
		</style>

	</head>

	<body>
		<div id="rotate-tip">
			<img src="ad/landscape-guide.jpg" style="width: 100%; height: 100%;">
		</div>
		<div id="adLoadFail">
			<p id="adText">Ad is loading, please try again later.</p>
		</div>

		<!--end-->
		<script type="text/javascript">
			function loadLib(url) {
				var script = document.createElement("script");
				script.async = false;
				script.src = url;
				document.body.appendChild(script);
			}
		</script>
		<script type="text/javascript" src="./index.js"></script>

		<!-- Adsgram 广告层 -->
		<div id="tg-ad-layer">
			<div id="tg-score-toast">+200 pts</div>
			<button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
		</div>

		<script type="text/javascript">
		(function () {
			var AdController = null;      // 激励广告
			var IntAdController = null;   // 插屏广告

			// 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
			function loadConfig(cb) {
				fetch('ID.txt?_=' + Date.now())
					.then(function (r) { return r.text(); })
					.then(function (text) {
						var cfg = {};
						text.split('\n').forEach(function (line) {
							var parts = line.trim().split('=');
							if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
						});
						cb(cfg);
					})
					.catch(function () { cb({}); });
			}

			function initAds(cfg) {
				if (!window.Adsgram) return;
				var rewardId = cfg['REWARD_BLOCK_ID'] || '';
				var intId    = cfg['INT_BLOCK_ID']    || '';
				try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch (e) {}
				try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch (e) {}

				document.getElementById('tg-reward-btn').style.display = 'block';
				startIntAdTimer();
			}

			function waitAndInit(cfg) {
				if (window.Adsgram) {
					initAds(cfg);
				} else {
					var sdkCheck = setInterval(function () {
						if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
					}, 300);
				}
			}

			// 先读配置，再初始化广告
			loadConfig(function (cfg) {
				waitAndInit(cfg);
			});

			// 激励广告：看完 +200 分
			window.tgShowRewardAd = function () {
				if (!AdController) return;
				var btn = document.getElementById('tg-reward-btn');
				btn.disabled = true;
				AdController.show().then(function () {
					// 通知游戏加分（游戏脚本可覆盖此函数）
					if (typeof window.onAdsgramReward === 'function') {
						window.onAdsgramReward(200);
					}
					// 浮动提示
					var toast = document.getElementById('tg-score-toast');
					toast.style.display = 'block';
					toast.style.animation = 'none';
					setTimeout(function () {
						toast.style.animation = 'floatUp 1.2s ease forwards';
						setTimeout(function () { toast.style.display = 'none'; }, 1200);
					}, 20);
					// 60 秒冷却
					var cd = 60;
					btn.textContent = '⏳ ' + cd + 's';
					var cdTimer = setInterval(function () {
						cd--;
						if (cd <= 0) {
							clearInterval(cdTimer);
							btn.disabled = false;
							btn.textContent = '📺 Watch Ad +200 pts';
						} else {
							btn.textContent = '⏳ ' + cd + 's';
						}
					}, 1000);
				}).catch(function () {
					btn.disabled = false;
				});
			};

			// 插屏广告：每 30 秒自动弹出
			var intAdInterval = null;
			function startIntAdTimer() {
				intAdInterval = setInterval(function () {
					if (!IntAdController) return;
					IntAdController.show().then(function () {}).catch(function () {});
				}, 30000);
			}
		})();
		</script>
	</body>
	<!-- <script type="text/javascript" src="ad/Ad.js"></script> -->

</html>
